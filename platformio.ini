[platformio]
default_envs = pico32-ota

[env:pico32-ota]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/stable/platform-espressif32.zip
board = pico32
framework = arduino

; Serial Monitor options
monitor_speed = 115200
test_ignore = *

; OTA partition scheme - 2x 1.5MB app partitions
board_build.partitions = partitions_ota.csv
board_build.filesystem = littlefs

; Hybrid compile: recompile IDF libs from source with custom SDK settings.
; Without this, pioarduino uses precompiled libs that ignore sdkconfig.defaults.
; First build will be slow (~10-20 min); subsequent builds use cached libs.
board_build.sdkconfig = sdkconfig.defaults
custom_sdkconfig =
    CONFIG_PM_ENABLE=y
    CONFIG_FREERTOS_USE_TICKLESS_IDLE=n
    CONFIG_ESP_COREDUMP_ENABLE_TO_FLASH=y
    CONFIG_ESP_COREDUMP_DATA_FORMAT_ELF=y
    CONFIG_ESP_COREDUMP_CHECKSUM_CRC32=y
    CONFIG_BT_ENABLED=n
    CONFIG_FREERTOS_HZ=1000
    CONFIG_ESP_PHY_MAX_WIFI_TX_POWER=10
    CONFIG_ESP32_WIFI_STATIC_RX_BUFFER_NUM=6
    CONFIG_LWIP_PBUF_POOL_SIZE=16
    CONFIG_LWIP_TCPIP_RECVMBOX_SIZE=32
    CONFIG_LWIP_TCP_RECVMBOX_SIZE=8
    CONFIG_LWIP_UDP_RECVMBOX_SIZE=6
    CONFIG_ESP32_BROWNOUT_DET_LVL_SEL_0=y
    CONFIG_MBEDTLS_ASYMMETRIC_CONTENT_LEN=y
    CONFIG_MBEDTLS_SSL_IN_CONTENT_LEN=16384
    CONFIG_MBEDTLS_SSL_OUT_CONTENT_LEN=4096
    CONFIG_MBEDTLS_SSL_VARIABLE_BUFFER_LENGTH=y
    CONFIG_MBEDTLS_SSL_KEEP_PEER_CERTIFICATE=n
    CONFIG_MBEDTLS_CHACHA20_C=n
    CONFIG_MBEDTLS_CHACHAPOLY_C=n
    CONFIG_MBEDTLS_AES_256_C=n
    CONFIG_MBEDTLS_SSL_SESSION_TICKETS=n
    CONFIG_MBEDTLS_SSL_RENEGOTIATION=n
    CONFIG_MBEDTLS_SSL_DTLS_HELLO_VERIFY=n
    CONFIG_MBEDTLS_SSL_DTLS_CONNECTION_ID=n

; Remove managed components we don't use (pulled in by hybrid compile base config).
; esp_insights embeds certificates that cause path errors; everything else is bloat.
custom_component_remove =
    espressif/esp_insights
    espressif/esp_diagnostics
    espressif/esp_diag_data_store
    espressif/esp_rainmaker
    espressif/rmaker_common
    espressif/esp_schedule
    espressif/jsmn
    espressif/json_generator
    espressif/json_parser
    espressif/network_provisioning
    espressif/esp_secure_cert_mgr
    espressif/esp-zboss-lib
    espressif/esp-zigbee-lib
    espressif/esp_rcp_update
    espressif/esp-modbus
    espressif/esp_modem
    espressif/esp-serial-flasher
    espressif/esp-dsp
    espressif/fb_gfx
    espressif/cbor
    espressif/lan867x
    espressif/lan86xx_common
    espressif/libsodium
    espressif/qrcode
    chmorgan/esp-libhelix-mp3

; Pre-build scripts
extra_scripts = 
    pre:scripts/generate_version_prebuild.py

; Build flags - same as base + OTA support
build_flags = 
    -Os
    -ffunction-sections
    -fdata-sections
    -Wl,--gc-sections
    -DCORE_DEBUG_LEVEL=3
    -Icomponents/libsmb2/include
    -DENABLE_SMB_UPLOAD          ; Enable SMB/CIFS upload support
    -DENABLE_SLEEPHQ_UPLOAD      ; Enable Cloud/SleepHQ upload support (uses HTTPS + OAuth)
    -DENABLE_WEBSERVER      ; Enable web server for on-demand upload testing
    -DENABLE_OTA_UPDATES         ; Enable Over-The-Air update functionality
    -DENABLE_LOG_RESOURCE_SUFFIX ; Append [res fh=.. ma=.. fd=..] to each log line (diagnostics only)
    -DLOG_BUFFER_SIZE=8192      ; ~8KB buffer (~70 lines) — prevents LOG GAP during boot
    -DARDUINO_LOOP_STACK_SIZE=8192   ; 8KB stack for loop task

; Library dependencies - same as base + OTA libraries
lib_deps = 
    bblanchon/ArduinoJson@^6.21.3

lib_extra_dirs = components
upload_speed = 115200

; Native testing environment
[env:native]
platform = native
build_flags = 
    -DUNIT_TEST
    -std=c++11
    -I include
    -I test/mocks
test_framework = unity
test_build_src = yes
; Exclude ESP32-specific source files from native build
; Tests will include only the specific components they need
build_src_filter = 
    -<*>
