<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 160" width="480" height="160" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <!-- Main gradient: deep blue to teal -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f1f3d;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0a2a3a;stop-opacity:1" />
    </linearGradient>
    <!-- Icon circle gradient -->
    <linearGradient id="circleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a6b8a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d4a6b;stop-opacity:1" />
    </linearGradient>
    <!-- Wave/accent gradient -->
    <linearGradient id="waveGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2dd4bf;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#38bdf8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#818cf8;stop-opacity:1" />
    </linearGradient>
    <!-- Upload arrow gradient -->
    <linearGradient id="arrowGrad" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#38bdf8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2dd4bf;stop-opacity:1" />
    </linearGradient>
    <!-- Glow filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Subtle glow for wave -->
    <filter id="waveGlow" x="-10%" y="-50%" width="120%" height="200%">
      <feGaussianBlur stdDeviation="1.8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <clipPath id="iconClip">
      <circle cx="80" cy="80" r="56"/>
    </clipPath>
  </defs>

  <!-- Background rounded rect -->
  <rect width="480" height="160" rx="18" fill="url(#bgGrad)"/>

  <!-- Subtle grid dots background texture -->
  <g opacity="0.06">
    <pattern id="dots" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1" fill="#7dd3fc"/>
    </pattern>
    <rect width="480" height="160" fill="url(#dots)"/>
  </g>

  <!-- ===== ICON AREA ===== -->
  <!-- Outer ring -->
  <circle cx="80" cy="80" r="58" fill="none" stroke="url(#waveGrad)" stroke-width="1.5" opacity="0.4"/>
  <!-- Icon background circle -->
  <circle cx="80" cy="80" r="54" fill="url(#circleGrad)"/>
  <!-- Inner ring accent -->
  <circle cx="80" cy="80" r="54" fill="none" stroke="url(#waveGrad)" stroke-width="1" opacity="0.6"/>

  <!-- SD Card shape (simplified) -->
  <g transform="translate(52, 52)">
    <!-- SD card body -->
    <path d="M7,0 L29,0 L36,7 L36,34 Q36,36 34,36 L2,36 Q0,36 0,34 L0,2 Q0,0 2,0 Z"
          fill="#0a2233" stroke="#38bdf8" stroke-width="1.2" opacity="0.9"/>
    <!-- SD card contacts (gold lines) -->
    <rect x="6" y="24" width="4" height="10" rx="1" fill="#2dd4bf" opacity="0.85"/>
    <rect x="12" y="24" width="4" height="10" rx="1" fill="#2dd4bf" opacity="0.85"/>
    <rect x="18" y="24" width="4" height="10" rx="1" fill="#2dd4bf" opacity="0.85"/>
    <rect x="24" y="24" width="4" height="10" rx="1" fill="#2dd4bf" opacity="0.85"/>
    <!-- Notch line -->
    <line x1="29" y1="0" x2="36" y2="7" stroke="#38bdf8" stroke-width="1.2" opacity="0.7"/>
  </g>

  <!-- Upload arrow overlaid (bottom-right of SD card, inside circle) -->
  <g transform="translate(96, 70)" filter="url(#glow)">
    <!-- Arrow shaft -->
    <line x1="0" y1="22" x2="0" y2="6" stroke="url(#arrowGrad)" stroke-width="3" stroke-linecap="round"/>
    <!-- Arrow head -->
    <polyline points="-6,10 0,2 6,10" fill="none" stroke="url(#arrowGrad)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Base line (cloud/storage suggestion) -->
    <line x1="-7" y1="25" x2="7" y2="25" stroke="#38bdf8" stroke-width="2.5" stroke-linecap="round" opacity="0.7"/>
  </g>

  <!-- Breathing / sleep waveform arc below SD card -->
  <g transform="translate(80, 108)" filter="url(#waveGlow)">
    <path d="M-28,0 C-24,-2 -22,-2 -18,0 C-14,2 -12,2 -8,0 C-4,-10 -2,-10 2,-4 C4,-1 5,8 8,8 C11,8 12,1 15,-4 C18,-10 20,-10 24,-4 C26,0 28,0 28,0"
          fill="none" stroke="url(#waveGrad)" stroke-width="2.2" stroke-linecap="round" opacity="0.85"/>
  </g>

  <!-- WiFi dots (top of circle) -->
  <g transform="translate(80, 36)" opacity="0.7" filter="url(#glow)">
    <path d="M-10,10 Q0,-2 10,10" fill="none" stroke="#38bdf8" stroke-width="1.8" stroke-linecap="round"/>
    <path d="M-6,14 Q0,8 6,14" fill="none" stroke="#38bdf8" stroke-width="1.8" stroke-linecap="round"/>
    <circle cx="0" cy="17" r="2" fill="#38bdf8"/>
  </g>

  <!-- ===== TEXT AREA ===== -->
  <!-- Main title -->
  <text x="154" y="62" font-size="30" font-weight="700" letter-spacing="-0.5" fill="white">
    CPAP
    <tspan fill="url(#waveGrad)"> Data</tspan>
  </text>
  <text x="154" y="96" font-size="30" font-weight="700" letter-spacing="-0.5" fill="white">Uploader</text>

  <!-- Accent underline bar -->
  <rect x="154" y="104" width="270" height="2.5" rx="1.25" fill="url(#waveGrad)" opacity="0.7"/>

  <!-- Tagline -->
  <text x="154" y="126" font-size="12.5" font-weight="400" fill="#94a3b8" letter-spacing="0.3">
    Auto-sync your therapy data · ESP32 · Cloud &amp; NAS
  </text>
</svg>
